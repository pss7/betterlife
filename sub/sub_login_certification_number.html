<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="Keywords" content="" />
    <meta name="Description" content="" />
    <meta name="Author" content="" />
    <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>베터라이프</title>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sub.css">
    <link rel="stylesheet" href="../css/aos.css">
    <link rel="stylesheet" href="../css/slick.css">

    <script src="../js/jquery-1.12.4.min.js"></script>
    <script src="../js/slick.min.js"></script>
    <script src="../js/aos.js"></script>
    <script src="../js/sub.js"></script>
    <script src="../js/script.js"></script>

</head>

<body>

    <div id="wrap">

        <header id="headerWrap">
            <div class="container">
                <div class="headerBox">
                    <a href="#" aria-label="이 전 페이지이동" class="prevPageLink"></a>
                </div>
            </div>
        </header>
        <!-- //headerWrap -->

        <main>

            <!-- 콘텐츠 영역 -->
            <div class="contentBox">
                <div class="container">
                    <div class="loginBox">

                        <div class="certificationNumberBox">
                            <p class="certificationNumberText">
                                010-1234-5678로 <br>
                                인증번호를 발송하였습니다.
                            </p>

                            <form>

                                <div class="certificationNumberBox">
                                    <div class="inputBox">
                                        <input id="id" type="text" placeholder="인증번호 6자리 입력">
                                        <label for="id" class="blind">인증번호 6자리 입력</label>
                                        <span class="authTime">04:59</span>
                                    </div>
                                    <button type="submit" class="certificationNumberBtn">
                                        재발송
                                    </button>
                                </div>
                                <!-- //certificationNumberBox -->

                                <button type="submit" class="loginBtn">
                                    인증 완료
                                </button>

                            </form>

                            <p class="loginInfoText">
                                휴대폰 번호가 틀린 경우 (주)베터라이프로 문의하세요.
                            </p>

                            <img src="../images/common/logo01.svg" alt="BETTERLIFE" class="logo">

                        </div>
                        <!-- //certificationNumberBox -->

                    </div>
                    <!-- //loginBox -->

                </div>
                <!-- //container -->

                <div class="certificationKeypadBox">

                    <div class="authCodeDisplayBox">
                        <span class="authCodeSource">From Messages</span>
                        <strong class="authCodeNumber">123456</strong>
                    </div>
                    <!-- //authCodeDisplayBox -->

                    <div class="keypadNumberBox">
                        <button type="button" class="keypadBtn">
                            <span class="num">1</span>
                        </button>
                        <button type="button" class="keypadBtn">
                            <span class="num">2</span>
                            <span class="eng">ABC</span>
                        </button>
                        <button type="button" class="keypadBtn">
                            <span class="num">3</span>
                            <span class="eng">DEF</span>
                        </button>
                        <button type="button" class="keypadBtn">
                            <span class="num">4</span>
                            <span class="eng">GHI</span>
                        </button>
                        <button type="button" class="keypadBtn">
                            <span class="num">5</span>
                            <span class="eng">JKL</span>
                        </button>
                        <button type="button" class="keypadBtn">
                            <span class="num">6</span>
                            <span class="eng">MNO</span>
                        </button>
                        <button type="button" class="keypadBtn">
                            <span class="num">7</span>
                            <span class="eng">PQRS</span>
                        </button>
                        <button type="button" class="keypadBtn">
                            <span class="num">8</span>
                            <span class="eng">TUV</span>
                        </button>
                        <button type="button" class="keypadBtn">
                            <span class="num">9</span>
                            <span class="eng">WXYZ</span>
                        </button>
                        <button type="button" class="keypadBtn keypadBlank" aria-hidden="true" tabindex="-1"></button>
                        <button type="button" class="keypadBtn keypadZeroBtn">
                            <span class="num">0</span>
                        </button>
                        <button type="button" class="keypadBtn keypadDeleteBtn">
                            <span class="blind">삭제</span>
                        </button>
                    </div>
                    <!-- //keypadNumberBox -->

                </div>
                <!-- //certificationKeypadBox -->

            </div>
            <!--//contentBox -->

        </main>
        <!-- //main -->

        <footer id="footerWrap">
            <div class="container">

                <div class="bannerBox">

                    <div class="slickWrap">
                        <div class="slick">

                            <div class="slide">
                                <a href="#" class="slideBox">
                                    <p>
                                        더 많은 정보가 궁금하다면?
                                        <strong>
                                            블로그에서 확인하세요!
                                        </strong>
                                    </p>
                                    <img src="../images/common/banner_img01.svg" alt="">
                                </a>
                            </div>
                            <!-- //slide -->

                            <div class="slide">
                                <a href="#" class="slideBox">
                                    <p>
                                        더 많은 정보가 궁금하다면?
                                        <strong>
                                            블로그에서 확인하세요!
                                        </strong>
                                    </p>
                                    <img src="../images/common/banner_img01.svg" alt="">
                                </a>
                            </div>
                            <!-- //slide -->

                            <div class="slide">
                                <a href="#" class="slideBox">
                                    <p>
                                        더 많은 정보가 궁금하다면?
                                        <strong>
                                            블로그에서 확인하세요!
                                        </strong>
                                    </p>
                                    <img src="../images/common/banner_img01.svg" alt="">
                                </a>
                            </div>
                            <!-- //slide -->

                        </div>
                    </div>
                </div>
                <!-- //bannerBox -->

                <div class="footerBox">
                    <span class="copyright">
                        ⓒ Betterlife Inc. All rights reserved.SINCE 2014
                    </span>
                </div>
                <!-- //footerBox -->

            </div>
        </footer>
        <!-- //footerWrap -->

    </div>
    <!-- //wrap -->

</body>

</html>
