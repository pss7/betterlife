    <div id="wrap">

            <div class="contentBox">

                    <div class="noticeListBox">
                        <ul class="noticeList">
                            <li>
                                <a href="#">
                                    <h2>
                                        정기점검 주간 안내

                            </li>
                            <li>
                                <a href="#">

                                    </p>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <h2>
                                        기타 안내
                                    </h2>
                                    <p>
                                        기타 안내사항을 확인하세요
                                    </p>
                                </a>
                            </li>
                        </ul>
                        <!-- //noticeList -->

                    </div>
                    <!-- //noticeListBox -->


                </div>
                <!-- //container -->

            </div>
            <!--//contentBox -->

        </main>
        <!-- //main -->

        <footer id="footerWrap">

                    <div class="slickWrap">
                        <div class="slick">

                            <div class="slide">
                                <a href="#" class="slideBox">
                                    <p>
                                        더 많은 정보가 궁금하다면?
                                        <strong>
                                            블로그에서 확인하세요!
                                        </strong>
                                    </p>
                                    <img src="../images/common/banner_img01.svg" alt="">

                            </div>
                            <!-- //slide -->

                            <div class="slide">
                                <a href="#" class="slideBox">
                                    <p>
                                        더 많은 정보가 궁금하다면?

                                        </strong>
