<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="Keywords" content="" />
    <meta name="Description" content="" />
    <meta name="Author" content="" />
    <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>베터라이프</title>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sub.css">
    <link rel="stylesheet" href="../css/aos.css">
    <link rel="stylesheet" href="../css/slick.css">

    <script src="../js/jquery-1.12.4.min.js"></script>
    <script src="../js/slick.min.js"></script>
    <script src="../js/aos.js"></script>
    <script src="../js/sub.js"></script>
    <script src="../js/script.js"></script>

</head>

<body>

    <div id="wrap">


        <main>

            <!-- 콘텐츠 영역 -->
            <div class="contentBox">

                <div class="container">

                    <div class="loginBox">

                        <div class="loginLogoBox">
                            <img src="../images/common/logo02.svg" alt="BETTERLIFE">
                            <h1>라돈 종합관리 전문기업</h1>
                        </div>
                        <!-- //loginLogoBox -->

                        <form>

                            <div class="inputBox">
                                <input id="id" type="text" placeholder="아이디 입력">
                                <label for="id" class="blind">아이디 입력</label>
                            </div>

                            <div class="inputBox">
                                <input id="password" type="text" placeholder="비밀번호 입력">
                                <label for="password" class="blind">비밀번호 입력</label>
                            </div>

                            <div class="inputBox">
                                <input id="chk" type="checkbox" class="blind">
                                <label for="chk">자동 로그인</label>
                            </div>

                            <button type="submit" class="loginBtn">
                                로그인
                            </button>

                        </form>

                        <p class="loginInfoText">
                            <strong>
                                보안을 위해 30일 주기로 휴대폰 인증을 진행합니다.
                            </strong>
                            최초 로그인 시, 등록된 번호로 인증번호(6자리)가 발송됩니다.
                        </p>

                    </div>
                    <!-- //loginBox -->

                </div>
                <!-- //container -->

            </div>
            <!--//contentBox -->

        </main>
        <!-- //main -->

        <footer id="footerWrap">
            <div class="container">

                <div class="bannerBox">

                    <div class="slickWrap">
                        <div class="slick">

                            <div class="slide">
                                <a href="#" class="slideBox">
                                    <p>
                                        더 많은 정보가 궁금하다면?
                                        <strong>
                                            블로그에서 확인하세요!
                                        </strong>
                                    </p>
                                    <img src="../images/common/banner_img01.svg" alt="">
                                </a>
                            </div>
                            <!-- //slide -->

                            <div class="slide">
                                <a href="#" class="slideBox">
                                    <p>
                                        더 많은 정보가 궁금하다면?
                                        <strong>
                                            블로그에서 확인하세요!
                                        </strong>
                                    </p>
                                    <img src="../images/common/banner_img01.svg" alt="">
                                </a>
                            </div>
                            <!-- //slide -->

                            <div class="slide">
                                <a href="#" class="slideBox">
                                    <p>
                                        더 많은 정보가 궁금하다면?
                                        <strong>
                                            블로그에서 확인하세요!
                                        </strong>
                                    </p>
                                    <img src="../images/common/banner_img01.svg" alt="">
                                </a>
                            </div>
                            <!-- //slide -->

                        </div>
                    </div>
                </div>
                <!-- //bannerBox -->

                <div class="footerBox">
                    <span class="copyright">
                        ⓒ Betterlife Inc. All rights reserved.SINCE 2014
                    </span>
                </div>
                <!-- //footerBox -->

            </div>
        </footer>
        <!-- //footerWrap -->

    </div>
    <!-- //wrap -->

</body>

</html>
